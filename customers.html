<!DOCTYPE html>
<html>
<head>
  <title>Customer List</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #8B4513, #D2691E);
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 1200px;
      margin: 0 auto;
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      color: #FFD700;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      color: #333;
    }
    th {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 14px;
    }
    tr:nth-child(even) {
      background: rgba(0, 0, 0, 0.05);
    }
    tr:hover {
      background: rgba(76, 175, 80, 0.1);
      transition: background 0.3s ease;
    }
    .member-level {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      display: inline-block;
    }
    .silver {
      background: #C0C0C0;
      color: #333;
    }
    .gold {
      background: #FFD700;
      color: #333;
    }
    .platinum {
      background: #E5E4E2;
      color: #333;
    }
    .no-customers {
      text-align: center;
      padding: 40px;
      color: #666;
      font-style: italic;
    }
    .nav-link {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background: #FF6B35;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.3s ease;
      text-align: center;
    }
    .nav-link:hover {
      background: #E55A2B;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
    }
    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }
      table {
        font-size: 14px;
      }
      th, td {
        padding: 10px;
      }
      h2 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📋 รายชื่อลูกค้า</h2>

    {% if customers %}
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Level</th>
        </tr>
      </thead>
      <tbody>
        {% for c in customers %}
        <tr>
          <td>{{ c[0] }}</td>
          <td>{{ c[1] }}</td>
          <td>{{ c[2] }}</td>
          <td>{{ c[3] }}</td>
          <td>
            <span class="member-level {{ c[4].lower() }}">{{ c[4] }}</span>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <div class="no-customers">
      <p>ยังไม่มีลูกค้าลงทะเบียน</p>
    </div>
    {% endif %}

    <div style="text-align: center;">
      <a href="/" class="nav-link">กลับหน้าสมัคร</a>
    </div>
  </div>
</body>
</html>
