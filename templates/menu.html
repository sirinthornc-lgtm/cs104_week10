<!DOCTYPE html>
<html>
<head>
  <title>Coffee Menu</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #8B4513, #D2691E);
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h2 {
      text-align: center;
      font-size: 2.5em;
      color: #FFD700;
      margin-bottom: 30px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-body {
      padding: 15px;
    }

    .card-title {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .price {
      color: #FFD700;
      font-weight: bold;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .nav {
      text-align: center;
      margin-top: 30px;
    }

    .nav a {
      color: #FFD700;
      text-decoration: none;
      font-weight: bold;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h2 {
        font-size: 2em;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>☕ เมนูกาแฟ</h2>

<div class="menu-grid">

  {% for item in menu %}
  <div class="card">
    <img src="{{ item[4] }}">
    <div class="card-body">
      <div class="card-title">{{ item[1] }}</div>
      <div class="price">฿{{ item[3] }}</div>
      <button>สั่งซื้อ</button>
    </div>
  </div>
  {% endfor %}

</div>

    <div class="nav">
      <a href="/">⬅ กลับหน้าสมัคร</a>
    </div>

  </div>
</body>
</html>
