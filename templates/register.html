<!DOCTYPE html>
<html>
<head>
  <title>Coffee Shop - Register</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #8B4513, #D2691E);
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 400px;
      width: 100%;
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, select {
      padding: 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    input:focus, select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(210, 105, 30, 0.5);
      background: #fff;
    }
    button {
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s ease;
      margin-top: 10px;
    }
    button:hover {
      background: #45a049;
    }
    p {
      text-align: center;
      margin-top: 20px;
    }
    a {
      color: #FFD700;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>☕ สมัครสมาชิก Coffee Shop</h2>

    <form action="/add_customer" method="post">
      <label for="name">Name:</label>
      <input type="text" name="name" id="name" required><br>

      <label for="email">Email:</label>
      <input type="email" name="email" id="email" required><br>

      <label for="phone">Phone:</label>
      <input type="text" name="phone" id="phone" required><br>

      <label for="member_level">Member Level:</label>
      <select name="member_level" id="member_level">
        <option>Silver</option>
        <option>Gold</option>
        <option>Platinum</option>
      </select><br>

      <button type="submit">สมัครสมาชิก</button>
    </form>

    <p><a href="/customers">ดูรายชื่อลูกค้า</a></p>
  </div>
</body>
</html>
